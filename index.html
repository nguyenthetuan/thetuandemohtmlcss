<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloading App...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
      width: 100%;
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border-radius: 22px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { color: #8888aa; font-size: 14px; line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #6c63ff;
      border-radius: 50%;
      margin: 28px auto 0;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fallback { margin-top: 28px; display: none; }
    .fallback a {
      display: block; margin: 8px 0; padding: 14px 20px;
      background: #1e1e2e; border-radius: 12px;
      color: #fff; text-decoration: none; font-size: 15px;
      font-weight: 600; transition: background .2s;
    }
    .fallback a:hover { background: #2a2a3e; }
    .fallback a .sub { font-size: 12px; color: #8888aa; font-weight: 400; display: block; margin-top: 2px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📲</div>
  <h1>Đang mở cửa hàng ứng dụng…</h1>
  <p>Bạn sẽ được chuyển tới đúng store<br>phù hợp với thiết bị của bạn.</p>
  <div class="spinner" id="spinner"></div>

  <div class="fallback" id="fallback">
    <p style="margin-bottom:12px;color:#8888aa;font-size:13px;">Không tự động chuyển được?<br>Chọn thủ công:</p>
    <a href="#" id="ios-link">
      🍎 App Store
      <span class="sub">dành cho iPhone / iPad</span>
    </a>
    <a href="#" id="android-link">
      🤖 Google Play
      <span class="sub">dành cho Android</span>
    </a>
  </div>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const ios     = params.get('ios')     || '';
  const android = params.get('android') || '';

  document.getElementById('ios-link').href     = ios     || '#';
  document.getElementById('android-link').href = android || '#';

  // ── detect device (nhiều signal hơn) ──────────────────────────
  const ua = navigator.userAgent || navigator.vendor || window.opera || '';

  const isIOS = (
    /iPad|iPhone|iPod/.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)  // iPad iOS 13+
  ) && !window.MSStream;

  const isAndroid = /android/i.test(ua);

  // ── redirect ngay lập tức ──────────────────────────────────────
  let target = '';
  if      (isIOS     && ios)     target = ios;
  else if (isAndroid && android) target = android;
  // desktop / unknown → ưu tiên android rồi ios
  else if (android) target = android;
  else if (ios)     target = ios;

  if (target) {
    // dùng replace để không lưu trang redirect vào history
    window.location.replace(target);
  } else {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
    document.querySelector('h1').textContent = 'Chọn cửa hàng ứng dụng';
    document.querySelector('p').textContent  = 'Nhấn vào link phù hợp với thiết bị của bạn.';
  }
</script>
</body>
</html>
